<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TaKiA - AI Voice Tutor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; 
      background-color: #03221a; 
      color: #ecfdf5; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      margin: 0; 
      padding: 0;
      overflow: hidden;
    }

    .auth-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: #03221a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .auth-container {
      display: flex; flex-direction: column; align-items: center;
      width: 90vw; max-width: 380px; padding: 2rem;
      background: #022c22; border: 1px solid #047857;
      border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      text-align: center;
    }

    .auth-logo-svg {
      width: 80px; height: 80px; fill: none;
      stroke: #34d399; stroke-width: 6.5;
      stroke-linecap: round; stroke-linejoin: round;
      filter: drop-shadow(0 0 12px rgba(52, 211, 153, 0.6));
    }

    .auth-title { font-size: 2.2rem; font-weight: 800; color: #34d399; margin: 0; letter-spacing: -0.5px; }
    .auth-subtitle { font-size: 0.8rem; color: #a7f3d0; margin-bottom: 1.5rem; opacity: 0.85; }
    .auth-form { display: flex; flex-direction: column; width: 100%; gap: 12px; }

    .auth-input {
      width: 100%; padding: 12px 16px;
      background: #064e3b; border: 1px solid #047857;
      border-radius: 12px; color: #ecfdf5;
      font-family: inherit; font-size: 0.9rem; outline: none;
    }
    .auth-input::placeholder { color: #6ee7b7; opacity: 0.6; }

    .auth-btn {
      width: 100%; padding: 12px; margin-top: 6px;
      background: linear-gradient(135deg, #059669, #047857);
      color: white; border: none; border-radius: 12px;
      font-family: inherit; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 15px rgba(5, 150, 105, 0.4);
    }

    .app-wrapper {
      position: relative; width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }

    /* DISEÑO POR DEFECTO (Móviles) */
    .app-card { 
      background-color: #022c22; padding: 2rem 1.25rem; 
      border-radius: 28px; width: 100%; max-width: 380px; 
      text-align: center; display: flex; flex-direction: column; 
      align-items: center; justify-content: space-between; 
      position: relative; z-index: 2;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(52, 211, 153, 0.15); min-height: 480px;
    }

    /* DISEÑO CIRCULAR CLÁSICO PARA PC */
    @media (min-width: 769px) {
      .app-card {
        width: 500px;
        height: 500px;
        max-width: 500px;
        min-height: 500px;
        border-radius: 50%;
        padding: 4.5rem 2rem;
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 0 50px rgba(4, 120, 87, 0.25);
        border: 2px solid rgba(52, 211, 153, 0.4);
        justify-content: center;
        gap: 0.4rem;
        position: relative;
      }
      .app-card h1 { font-size: 1.85rem; margin-top: 5px; }
      .app-card .subtitle { font-size: 0.75rem; }
      .button-container { margin: 0.4rem 0 !important; width: 200px !important; height: 200px !important; }
      .call-btn { width: 90px !important; height: 90px !important; }
    }

    .toggle-transcript-btn, .toggle-voices-btn {
      position: absolute; top: 24px;
      background: #047857; border: 1px solid #34d399; color: #ecfdf5;
      width: 42px; height: 42px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; box-shadow: 0 0 12px rgba(52, 211, 153, 0.2);
      transition: transform 0.2s, background-color 0.2s; z-index: 10;
    }
    .toggle-transcript-btn { right: 24px; }
    .toggle-voices-btn { left: 24px; top: 24px; }

    @media (min-width: 769px) {
      .toggle-transcript-btn { top: 90px; right: 80px; }
      .toggle-voices-btn { top: 90px; left: 80px; }
    }

    .toggle-transcript-btn:active, .toggle-voices-btn:active { transform: scale(0.92); }

    h1 { margin: 0; color: #34d399; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; text-shadow: 0 0 15px rgba(52, 211, 153, 0.3); }
    .subtitle { font-size: 0.85rem; font-weight: 500; color: #a7f3d0; margin-top: 0.2rem; opacity: 0.85; }

    .button-container {
      position: relative; width: 240px; height: 240px;
      display: flex; justify-content: center; align-items: center; margin: 1.2rem 0;
    }

    .wave-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    
    /* Lienzo global que abarca toda la pantalla tanto en Móviles como en PC */
    .pc-outer-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
      pointer-events: none;
      display: block;
    }

    .call-btn { 
      width: 120px; height: 120px; border-radius: 50%; border: none; 
      background: linear-gradient(135deg, #059669, #047857); 
      color: white; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
      display: flex; justify-content: center; align-items: center; 
      box-shadow: 0 0 25px rgba(5, 150, 105, 0.4); z-index: 2; padding: 0; position: relative;
    }

    .btn-content-default { display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.25s ease, transform 0.25s ease; width: 100%; height: 100%; }
    .takia-face-svg { width: 38px; height: 38px; fill: none; stroke: #a7f3d0; stroke-width: 6.5; stroke-linecap: round; stroke-linejoin: round; }
    .btn-label-default { font-family: inherit; font-size: 0.68rem; font-weight: 800; margin-top: 2px; letter-spacing: 0.5px; color: #ecfdf5; text-transform: uppercase; }
    
    .btn-label-listening { 
      position: absolute; 
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 0 12px; 
      font-size: 0.62rem; 
      font-weight: 800; 
      letter-spacing: 0.5px; 
      color: #ffffff; 
      text-transform: uppercase; 
      opacity: 0; 
      transition: opacity 0.25s ease; 
      pointer-events: none; 
      text-align: center;
      line-height: 1.2;
    }

    .call-btn.active-talk .btn-content-default { opacity: 0; transform: scale(0.6); }
    .call-btn.active-talk .btn-label-listening { opacity: 1; }

    .call-btn.talking { background: linear-gradient(135deg, #dc2626, #991b1b); box-shadow: 0 0 30px rgba(220, 38, 38, 0.6); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }

    .status { font-size: 0.85rem; font-weight: 500; color: #a7f3d0; z-index: 2; }

    .panel-backdrop {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);
      opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease; z-index: 90;
    }
    .panel-backdrop.active { opacity: 1; visibility: visible; }

    .sidebar-panel {
      position: fixed; bottom: 0; left: 0; width: 100vw; max-height: 80vh;
      background-color: #022c22; border-top: 2px solid #047857; border-radius: 28px 28px 0 0;
      box-shadow: 0 -15px 40px rgba(0, 0, 0, 0.8); display: flex; flex-direction: column;
      padding: 1.25rem 1.25rem 1.5rem 1.25rem; z-index: 100; transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1); will-change: transform;
    }
    .sidebar-panel.open { transform: translateY(0%); }

    @media (min-width: 769px) {
      .sidebar-panel {
        top: 0; bottom: auto; right: 0; left: auto; width: 380px; height: 100vh;
        max-height: 100vh; border-top: none; border-left: 2px solid #047857;
        border-radius: 0; transform: translateX(100%); transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
      }
      .sidebar-panel.open { transform: translateX(0%); }
    }

    .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #047857; padding-bottom: 0.75rem; margin-bottom: 0.75rem; }
    .sidebar-header h3 { margin: 0; color: #34d399; font-size: 1.05rem; font-weight: 700; }
    .close-btn { background: none; border: none; color: #a7f3d0; font-size: 1.3rem; cursor: pointer; padding: 4px; }

    .transcript-box { 
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; 
      font-size: 0.85rem; min-height: 220px; max-height: 340px; padding-right: 4px; margin-bottom: 0.75rem;
    }
    .msg { padding: 0.65rem 0.95rem; border-radius: 1rem; max-width: 85%; word-wrap: break-word; line-height: 1.4; white-space: pre-wrap; }
    .msg.user { background-color: #059669; color: white; align-self: flex-end; border-bottom-right-radius: 0.2rem; }
    .msg.ai { background-color: #064e3b; color: #ecfdf5; align-self: flex-start; border: 1px solid #047857; border-bottom-left-radius: 0.2rem; }

    .chat-input-wrapper { display: flex; gap: 8px; align-items: center; background: #03221a; padding: 6px 8px 6px 14px; border-radius: 20px; border: 1px solid #047857; }
    .chat-input { flex: 1; background: transparent; border: none; color: #ecfdf5; font-family: inherit; font-size: 0.88rem; outline: none; }
    .chat-input::placeholder { color: #6ee7b7; opacity: 0.6; }
    .chat-send-btn { background: #059669; border: none; color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background-color 0.2s, transform 0.1s; }
    .chat-send-btn:active { transform: scale(0.92); }

    .voice-options-list { display: flex; flex-direction: column; gap: 10px; }
    .voice-item { display: flex; align-items: center; justify-content: space-between; background: #064e3b; padding: 12px 16px; border-radius: 14px; border: 1.5px solid transparent; cursor: pointer; transition: background-color 0.2s, border-color 0.2s; }
    .voice-item.selected { border-color: #34d399; background: #047857; }
    .voice-name { font-size: 0.9rem; font-weight: 700; color: #ecfdf5; }
    .voice-desc { font-size: 0.75rem; color: #a7f3d0; opacity: 0.85; }
  </style>
</head>
<body>

  <div class="auth-screen" id="authScreen">
    <div class="auth-container">
      <div class="auth-logo-wrapper">
        <svg class="auth-logo-svg" viewBox="0 0 100 100">
          <circle cx="30" cy="30" r="7" fill="#34d399" stroke="none" />
          <path d="M 58 30 Q 67 20 76 30" stroke-width="8" />
          <path d="M 30 50 L 50 70 L 70 50" stroke-width="7.5" />
          <path d="M 26 82 L 74 82" stroke-width="7.5" />
        </svg>
      </div>
      <h2 class="auth-title">TaKiA</h2>
      <div class="auth-subtitle">AI English Voice Tutor</div>
      
      <form class="auth-form" onsubmit="handleAuth(event)">
        <input type="text" class="auth-input" id="userName" placeholder="Nombre de usuario" required>
        <input type="password" class="auth-input" id="userPass" placeholder="Contraseña" required>
        <button type="submit" class="auth-btn">Iniciar Práctica</button>
      </form>
    </div>
  </div>

  <div class="panel-backdrop" id="panelBackdrop"></div>

  <!-- Lienzo Global Exterior (Funciona en Móviles y PC) -->
  <canvas id="outerWaveCanvas" class="pc-outer-canvas"></canvas>

  <div class="app-wrapper">
    <div class="app-card" id="appCard">

      <button class="toggle-transcript-btn" id="toggleSidebarBtn" title="Ver Transcripción">💬</button>
      <button class="toggle-voices-btn" id="toggleVoicesBtn" title="Cambiar Voz">🎙️</button>

      <div>
        <h1>TaKiA</h1>
        <div class="subtitle">AI English Voice Tutor</div>
      </div>

      <div class="button-container">
        <canvas id="waveCanvas" class="wave-canvas"></canvas>
        <button id="talkBtn" class="call-btn">
          <div class="btn-content-default">
            <svg class="takia-face-svg" viewBox="0 0 100 100">
              <circle cx="30" cy="30" r="7" fill="#a7f3d0" stroke="none" />
              <path d="M 58 30 Q 67 20 76 30" stroke-width="8" />
              <path d="M 30 50 L 50 70 L 70 50" stroke-width="7.5" />
              <path d="M 26 82 L 74 82" stroke-width="7.5" />
            </svg>
            <span class="btn-label-default">Hablar</span>
          </div>
          <span class="btn-label-listening">Escuchando</span>
        </button>
      </div>

      <div class="status" id="statusText">Listo para hablar</div>
    </div>
  </div>

  <div class="sidebar-panel" id="sidebarTranscript">
    <div class="sidebar-header">
      <h3>Transcripción y Chat</h3>
      <button class="close-btn" id="closeSidebarBtn">✕</button>
    </div>
    <div class="transcript-box" id="transcriptBox"></div>
    
    <div class="chat-input-wrapper">
      <input type="text" id="chatInput" class="chat-input" placeholder="Escribe un mensaje a TaKiA..." onkeypress="handleChatKeyPress(event)">
      <button class="chat-send-btn" onclick="sendTextMessage()" title="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <div class="sidebar-panel" id="voiceSidebar">
    <div class="sidebar-header">
      <h3>Selección de Tutor</h3>
      <button class="close-btn" id="closeVoicesBtn">✕</button>
    </div>
    <div class="voice-options-list">
      <div class="voice-item selected" onclick="selectVoice('Aoede', this)">
        <div>
          <div class="voice-name">Aoede</div>
          <div class="voice-desc">Femenina • Cálida</div>
        </div>
      </div>
      <div class="voice-item" onclick="selectVoice('Fenrir', this)">
        <div>
          <div class="voice-name">Fenrir</div>
          <div class="voice-desc">Masculina • Profunda</div>
        </div>
      </div>
      <div class="voice-item" onclick="selectVoice('Puck', this)">
        <div>
          <div class="voice-name">Puck</div>
          <div class="voice-desc">Masculina • Versátil</div>
        </div>
      </div>
      <div class="voice-item" onclick="selectVoice('Kore', this)">
        <div>
          <div class="voice-name">Kore</div>
          <div class="voice-desc">Femenina • Clara</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_API_KEY = "AQ.Ab8RN6KmHrvodQOjvYxCnmfxgqTxcwVu48uGY9N310O5jXLYAg";

    const talkBtn = document.getElementById('talkBtn');
    const appCard = document.getElementById('appCard');
    const statusText = document.getElementById('statusText');
    const transcriptBox = document.getElementById('transcriptBox');
    const chatInput = document.getElementById('chatInput');
    
    const waveCanvas = document.getElementById('waveCanvas');
    const ctx = waveCanvas.getContext('2d');

    const outerWaveCanvas = document.getElementById('outerWaveCanvas');
    const outerCtx = outerWaveCanvas.getContext('2d');

    const sidebarTranscript = document.getElementById('sidebarTranscript');
    const voiceSidebar = document.getElementById('voiceSidebar');
    const backdrop = document.getElementById('panelBackdrop');

    function openPanel(panel) { panel.classList.add('open'); backdrop.classList.add('active'); }
    function closePanels() { sidebarTranscript.classList.remove('open'); voiceSidebar.classList.remove('open'); backdrop.classList.remove('active'); }

    document.getElementById('toggleSidebarBtn').onclick = () => openPanel(sidebarTranscript);
    document.getElementById('closeSidebarBtn').onclick = closePanels;
    document.getElementById('toggleVoicesBtn').onclick = () => openPanel(voiceSidebar);
    document.getElementById('closeVoicesBtn').onclick = closePanels;
    backdrop.onclick = closePanels;

    function handleAuth(e) {
      e.preventDefault();
      const authScreen = document.getElementById('authScreen');
      authScreen.style.opacity = '0';
      setTimeout(() => { authScreen.style.display = 'none'; }, 600);
    }

    let ws = null, audioCtx = null, mediaStream = null, processor = null;
    let analyser = null, audioDataArray = null;
    let isConnected = false, isMicActive = false;
    let currentState = 'idle'; 
    let SELECTED_VOICE_NAME = "Aoede";
    let lastUserQuery = "";
    let recognition = null;

    const MODEL_NAME = "models/gemini-2.5-flash-native-audio-preview-12-2025";
    const SYSTEM_INSTRUCTION = "You are TaKiA, a friendly English tutor. Keep responses brief (1-2 sentences).";

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = 'en-US';

      recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript;
        if (transcript.trim()) {
          appendMessage('user', transcript);
          lastUserQuery = transcript.trim();
        }
      };
    }

    async function selectVoice(name, el) {
      if (SELECTED_VOICE_NAME === name) { closePanels(); return; }
      SELECTED_VOICE_NAME = name;
      document.querySelectorAll('.voice-item').forEach(i => i.classList.remove('selected'));
      el.classList.add('selected');
      closePanels();
      if (isConnected) await reconnectWithNewVoice();
    }

    async function reconnectWithNewVoice() {
      isConnected = false; isMicActive = false;
      talkBtn.classList.remove('talking', 'active-talk');
      currentState = 'idle';
      if (ws) { ws.onerror = null; ws.onclose = null; ws.close(); ws = null; }
      statusText.innerText = 'Actualizando voz...';
      await new Promise(r => setTimeout(r, 300));
      await initWebSocket();
    }

    function appendMessage(sender, text) {
      if (!text || !text.trim()) return;
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('msg', sender);
      msgDiv.innerText = text.trim();
      transcriptBox.appendChild(msgDiv);
      transcriptBox.scrollTop = transcriptBox.scrollHeight;
      return msgDiv;
    }

    function handleChatKeyPress(e) { if (e.key === 'Enter') sendTextMessage(); }

    async function sendTextMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      appendMessage('user', text);
      lastUserQuery = text;
      chatInput.value = '';

      if (!isConnected) await initWebSocket();

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          clientContent: {
            turns: [{ role: "user", parts: [{ text: text }] }],
            turnComplete: true
          }
        }));
        currentState = 'thinking';
        statusText.innerText = '⏳ TaKiA pensando...';
      }
    }

    talkBtn.addEventListener('click', async () => {
      if (!isConnected) {
        await initWebSocket();
      } else {
        toggleMic();
      }
    });

    async function initWebSocket() {
      try {
        statusText.innerText = 'Conectando con TaKiA...';
        if (!audioCtx) {
          await startAudioInput();
        } else if (audioCtx.state === 'suspended') {
          await audioCtx.resume();
        }
        
        const uri = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${DEFAULT_API_KEY}`;
        ws = new WebSocket(uri);
        
        ws.onopen = () => {
          isConnected = true;
          statusText.innerText = 'Listo para hablar';
          
          ws.send(JSON.stringify({
            setup: {
              model: MODEL_NAME, 
              generationConfig: { 
                responseModalities: ["AUDIO"], 
                speechConfig: { 
                  voiceConfig: { prebuiltVoiceConfig: { voiceName: SELECTED_VOICE_NAME } } 
                }
              },
              systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] }
            }
          }));
        };

        ws.onmessage = async (event) => {
          let rawData = event.data;
          if (rawData instanceof Blob) rawData = await rawData.text();
          const response = JSON.parse(rawData);

          if (response.serverContent?.modelTurn?.parts) {
            currentState = 'speaking';
            statusText.innerText = 'TaKiA respondiendo...';
            
            for (const part of response.serverContent.modelTurn.parts) {
              if (part.inlineData?.mimeType?.startsWith("audio/pcm")) {
                playPCM24kHz(base64ToArrayBuffer(part.inlineData.data));
              }
            }
          }

          if (response.serverContent?.turnComplete) {
            currentState = 'idle';
            statusText.innerText = 'Listo para hablar';
            if (lastUserQuery) {
              fetchCleanTranscript(lastUserQuery);
              lastUserQuery = "";
            }
          }
        };

        ws.onerror = () => { if (isConnected) { statusText.innerText = 'Error de conexión'; stopCall(); } };
        ws.onclose = () => { if (isConnected) { statusText.innerText = 'Desconectado'; stopCall(); } };
      } catch (e) {
        statusText.innerText = 'Error al conectar';
        stopCall();
      }
    }

    async function fetchCleanTranscript(userText) {
      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${DEFAULT_API_KEY}`;
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemInstruction: { parts: [{ text: "You are TaKiA, an English tutor. Provide a 1-sentence reply in clean plain text with no formatting or reasoning." }] },
            contents: [{ parts: [{ text: userText }] }]
          })
        });
        const data = await res.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (text) appendMessage('ai', text);
      } catch (err) {
        console.error("Error al obtener transcripción:", err);
      }
    }

    function toggleMic() {
      if (!isConnected) return;
      isMicActive = !isMicActive;

      if (isMicActive) {
        talkBtn.classList.add('active-talk', 'talking');
        currentState = 'listening';
        statusText.innerText = '🎙️ TaKiA te escucha...';
        if (recognition) try { recognition.start(); } catch(e){}
      } else {
        talkBtn.classList.remove('talking', 'active-talk');
        currentState = 'thinking';
        statusText.innerText = '⏳ TaKiA pensando...';
        if (recognition) try { recognition.stop(); } catch(e){}
      }
    }

    async function startAudioInput() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 128;
      audioDataArray = new Uint8Array(analyser.frequencyBinCount);

      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const source = audioCtx.createMediaStreamSource(mediaStream);
      processor = audioCtx.createScriptProcessor(4096, 1, 1);

      processor.onaudioprocess = (e) => {
        if (!isMicActive || !ws || ws.readyState !== WebSocket.OPEN) return;
        const pcm = convertFloat32ToPCM16(e.inputBuffer.getChannelData(0));
        ws.send(JSON.stringify({ 
          realtimeInput: { mediaChunks: [{ mimeType: "audio/pcm", data: arrayBufferToBase64(pcm.buffer) }] } 
        }));
      };

      source.connect(processor);
      processor.connect(audioCtx.destination);
    }

    let nextStartTime = 0;
    function playPCM24kHz(buffer) {
      if (!audioCtx) return;
      const int16 = new Int16Array(buffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
      
      const audioBuffer = audioCtx.createBuffer(1, float32.length, 24000);
      audioBuffer.getChannelData(0).set(float32);
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
      
      const currentTime = audioCtx.currentTime;
      if (nextStartTime < currentTime) nextStartTime = currentTime;
      source.start(nextStartTime);
      nextStartTime += audioBuffer.duration;
    }

    function stopCall() {
      isConnected = false; isMicActive = false; currentState = 'idle';
      talkBtn.classList.remove('talking', 'active-talk');
      if (recognition) try { recognition.stop(); } catch(e){}
      if (ws) { ws.onerror = null; ws.onclose = null; ws.close(); ws = null; }
    }

    function convertFloat32ToPCM16(buffer) {
      let buf = new Int16Array(buffer.length);
      for (let i = 0; i < buffer.length; i++) {
        let s = Math.max(-1, Math.min(1, buffer[i]));
        buf[i] = s < 0 ? s * 32768 : s * 32767;
      }
      return buf;
    }
    function arrayBufferToBase64(buffer) { return btoa(String.fromCharCode(...new Uint8Array(buffer))); }
    function base64ToArrayBuffer(base64) {
      let binary = atob(base64);
      let bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    }

    // VARIABLES DE ANIMACIÓN Y SUAVIZADO (LERP)
    let step = 0;
    let outerStep = 0;

    let currentAmplitude = 5;
    let targetAmplitude = 5;

    let currentGlow = 12;
    let targetGlow = 12;

    let currentR = 52, currentG = 211, currentB = 153;
    let targetR = 52, targetG = 211, targetB = 153;

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      
      const rect = waveCanvas.getBoundingClientRect();
      waveCanvas.width = rect.width * dpr;
      waveCanvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      // Dimensiones de pantalla completa adaptativas
      outerWaveCanvas.width = window.innerWidth * dpr;
      outerWaveCanvas.height = window.innerHeight * dpr;
      outerCtx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Dibujar un rectángulo redondeado con ondas adaptado para móviles
    function drawRoundedWaveRect(ctx, x, y, width, height, radius, amplitude, step, waveCount) {
      const pointsPerSide = 30;
      ctx.beginPath();

      // Esquina superior derecha -> Esquina inferior derecha
      ctx.moveTo(x + width - radius, y);
      for (let i = 0; i <= pointsPerSide; i++) {
        const t = i / pointsPerSide;
        const py = y + radius + t * (height - 2 * radius);
        const wave = Math.sin(t * waveCount * Math.PI + step) * amplitude;
        ctx.lineTo(x + width + wave, py);
      }

      // Esquina inferior derecha -> Esquina inferior izquierda
      for (let i = 0; i <= pointsPerSide; i++) {
        const t = i / pointsPerSide;
        const px = x + width - radius - t * (width - 2 * radius);
        const wave = Math.cos(t * waveCount * Math.PI + step) * amplitude;
        ctx.lineTo(px, y + height + wave);
      }

      // Esquina inferior izquierda -> Esquina superior izquierda
      for (let i = 0; i <= pointsPerSide; i++) {
        const t = i / pointsPerSide;
        const py = y + height - radius - t * (height - 2 * radius);
        const wave = Math.sin(t * waveCount * Math.PI - step) * amplitude;
        ctx.lineTo(x - wave, py);
      }

      // Esquina superior izquierda -> Esquina superior derecha
      for (let i = 0; i <= pointsPerSide; i++) {
        const t = i / pointsPerSide;
        const px = x + radius + t * (width - 2 * radius);
        const wave = Math.cos(t * waveCount * Math.PI - step) * amplitude;
        ctx.lineTo(px, y - wave);
      }

      ctx.closePath();
      ctx.stroke();
    }

    function renderWaves() {
      step += 0.035;
      outerStep += 0.018;

      if (currentState === 'listening') {
        targetAmplitude = 9;
        targetGlow = 18;
        targetR = 110; targetG = 231; targetB = 183;
      } else if (currentState === 'speaking') {
        let avgVol = 0;
        if (analyser && audioDataArray) {
          analyser.getByteFrequencyData(audioDataArray);
          avgVol = audioDataArray.reduce((a, b) => a + b, 0) / audioDataArray.length;
        }
        targetAmplitude = 6 + (avgVol / 255) * 12;
        targetGlow = 16 + (avgVol / 255) * 18;
        targetR = 0; targetG = 255; targetB = 163;
      } else if (currentState === 'thinking') {
        targetAmplitude = Math.sin(step * 3) * 2 + 4;
        targetGlow = 10;
        targetR = 4; targetG = 120; targetB = 87;
      } else {
        // En espera
        targetAmplitude = Math.sin(step * 1.8) * 2 + 3.5;
        targetGlow = 10 + Math.sin(step * 1.8) * 3;
        targetR = 52; targetG = 211; targetB = 153;
      }

      // Transición ultrasuave LERP
      const lerpSpeed = 0.06;
      currentAmplitude += (targetAmplitude - currentAmplitude) * lerpSpeed;
      currentGlow += (targetGlow - currentGlow) * lerpSpeed;
      currentR += (targetR - currentR) * lerpSpeed;
      currentG += (targetG - currentG) * lerpSpeed;
      currentB += (targetB - currentB) * lerpSpeed;

      const activeColor = `rgb(${Math.round(currentR)}, ${Math.round(currentG)}, ${Math.round(currentB)})`;

      // 1. Renderizar Aro del Botón Central
      const width = waveCanvas.getBoundingClientRect().width;
      const height = waveCanvas.getBoundingClientRect().height;
      const centerX = width / 2;
      const centerY = height / 2;

      ctx.clearRect(0, 0, width, height);

      const buttonRadius = talkBtn.offsetWidth / 2; 
      const baseRadius = buttonRadius + 20;

      ctx.shadowBlur = currentGlow;
      ctx.shadowColor = activeColor;
      ctx.beginPath();
      ctx.lineWidth = 3;
      ctx.strokeStyle = activeColor;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      const points = 120;
      const waveCount = 8;

      for (let i = 0; i <= points; i++) {
        const angle = (i / points) * Math.PI * 2;
        const wave = Math.sin(angle * waveCount + step) * currentAmplitude;
        const r = baseRadius + wave;

        const x = centerX + Math.cos(angle) * r;
        const y = centerY + Math.sin(angle) * r;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();

      // 2. Renderizar Aro Exterior Adaptativo (Móviles y PC)
      const oWidth = window.innerWidth;
      const oHeight = window.innerHeight;
      const cardRect = appCard.getBoundingClientRect();

      outerCtx.clearRect(0, 0, oWidth, oHeight);

      outerCtx.shadowBlur = currentGlow * 1.1;
      outerCtx.shadowColor = activeColor;
      outerCtx.lineWidth = 2.5;
      outerCtx.strokeStyle = `rgba(${Math.round(currentR)}, ${Math.round(currentG)}, ${Math.round(currentB)}, 0.75)`;
      outerCtx.lineCap = 'round';
      outerCtx.lineJoin = 'round';

      if (window.innerWidth >= 769) {
        // EN PC: Aro Neón Circular Centrado
        const oCenterX = cardRect.left + cardRect.width / 2;
        const oCenterY = cardRect.top + cardRect.height / 2;
        const cardRadius = appCard.offsetWidth / 2;
        const outerBaseRadius = cardRadius + 18;

        outerCtx.beginPath();
        const outerWaveCount = 6;
        for (let i = 0; i <= points; i++) {
          const angle = (i / points) * Math.PI * 2;
          const wave = Math.sin(angle * outerWaveCount - outerStep) * (currentAmplitude * 0.7);
          const r = outerBaseRadius + wave;

          const x = oCenterX + Math.cos(angle) * r;
          const y = oCenterY + Math.sin(angle) * r;

          if (i === 0) outerCtx.moveTo(x, y);
          else outerCtx.lineTo(x, y);
        }
        outerCtx.closePath();
        outerCtx.stroke();
      } else {
        // EN MÓVILES: Aro Neón Rectangular Redondeado al Borde de la Tarjeta
        const padding = 12;
        const x = cardRect.left - padding;
        const y = cardRect.top - padding;
        const w = cardRect.width + (padding * 2);
        const h = cardRect.height + (padding * 2);
        const r = 36; // Coincide con la curvatura de la tarjeta

        drawRoundedWaveRect(outerCtx, x, y, w, h, r, currentAmplitude * 0.5, outerStep, 4);
      }

      requestAnimationFrame(renderWaves);
    }

    renderWaves();
  </script>
</body>
